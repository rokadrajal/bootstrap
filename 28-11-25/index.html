<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<body>
    <!-- PROGRESS -->

    <h1>html</h1>
    <div class="progress">
        <div class="progress-bar bg-primary" style="width: 90%;">90%</div>
    </div><br><br><br>
     <div class="progress">
        <div class="progress-bar progress-bar-striped bg-primary" style="width: 90%;">90%</div>
    </div><br><br><br>

     <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" style="width: 90%;">90%</div>
    </div><br><br><br>

    <div class="progress">
        <div class="progress-bar progress-bar-striped bg-primary" style="width: 30%;">30%</div>
        <div class="progress-bar progress-bar-striped bg-success" style="width: 50%;">50%</div>
        <div class="progress-bar progress-bar-striped bg-warning" style="width: 15%;">15%</div>
    </div><br><br><br>

    <div class="progress">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-secondary" style="width: 30%;">30%</div>
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 50%;">50%</div>
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-danger" style="width: 15%;">15%</div>
    </div><br><br><br><br><br>



    <!-- SPINNER -->

    <div class="spinner-border text-info"></div>
    <div class="spinner-border spinner-border-sm text-info"></div>
    <div class="spinner-border text-info" style="width: 50px; height: 50px;"></div><br><br><br>

    <div class="spinner-grow text-info"></div>
    <div class="spinner-grow spinner-grow-sm text-info"></div>
    <div class="spinner-grow text-info" style="width: 50px; height: 50px;"></div>






    
</body>
</html>
